{% extends "base.html" %}

{% block title %}Page Not Found (404) - Learnix{% endblock %}

{% block content %}
<div style="display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 70vh; text-align: center; padding: 2rem;">
    
    <div class="card glass-card" style="padding: 4rem 2rem; border-radius: 20px; max-width: 500px; width: 100%;">
        <div style="font-size: 5rem; color: #EF4444; margin-bottom: 1.5rem; text-shadow: 0 0 20px rgba(239, 68, 68, 0.25);">
            <i class="fas fa-satellite-dish"></i>
        </div>
        
        <h1 style="font-family: 'Outfit', sans-serif; font-size: 2.5rem; font-weight: 800; margin: 0 0 0.5rem 0; background: linear-gradient(135deg, #FF4B4B, #7C3AED); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">404 Error</h1>
        <h2 style="font-size: 1.25rem; font-weight: 600; margin: 0 0 1rem 0; color: #E2E8F0;">Page Not Found</h2>
        <p style="color: #94A3B8; line-height: 1.6; margin: 0 0 2rem 0;">Oops! The learning pathway you requested does not exist or has been relocated by administrators.</p>
        
        <a href="/" class="btn btn-primary" style="display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.75rem 2rem; border-radius: 50px;">
            <i class="fas fa-home"></i> Back to Dashboard
        </a>
    </div>

</div>
{% endblock %}
